<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 350px;
      padding: 10px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      margin: 0;
    }
    h3 {
      margin: 0 0 10px 0;
      font-size: 14px;
      font-weight: 600;
    }
    .status {
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      margin-bottom: 10px;
    }
    .status.listening {
      background: #2d5a27;
      color: #90ee90;
    }
    .status.waiting {
      background: #5a5727;
      color: #eeeb90;
    }
    button {
      width: 100%;
      padding: 8px 12px;
      border: none;
      border-radius: 4px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      font-size: 13px;
      margin-bottom: 8px;
    }
    button:hover {
      background: #2563eb;
    }
    button.select {
      background: #22c55e;
      margin-top: 4px;
    }
    button.select:hover {
      background: #16a34a;
    }
    button.clear {
      background: #ef4444;
      margin-top: 8px;
    }
    button.clear:hover {
      background: #dc2626;
    }
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      max-height: 250px;
      overflow-y: auto;
    }
    li {
      padding: 8px;
      border-radius: 4px;
      background: #2a2a2a;
      margin-bottom: 6px;
      font-size: 11px;
    }
    li .type {
      font-weight: 600;
      color: #60a5fa;
    }
    li .url {
      word-break: break-all;
      color: #9ca3af;
      margin-top: 4px;
    }
    li.selected {
      border: 2px solid #22c55e;
    }
  </style>
</head>
<body>
  <h3>Video URL Capturer</h3>
  <div id="status" class="status waiting">Fetching URLs...</div>
  <button id="refreshBtn">Refresh URLs</button>
  <ul id="urlList"></ul>
  
  <script src="popup.js"></script>
</body>
</html>
